name: Nexum CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-build:
    name: Backend CI (Java 25)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build (Backend)
        working-directory: ./backend
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          chmod +x mvnw
          ./mvnw clean install -DskipTests

  frontend-build:
    name: Frontend CI (React + TS)
    runs-on: ubuntu-latest
    needs: backend-build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Type Check & Lint
        working-directory: ./frontend
        run: |
          npm run lint 
          npx tsc --noEmit

      - name: Build (Frontend)
        working-directory: ./frontend
        run: npm run build

  docker-publish:
    name: Build & Push Docker Image (GHCR)
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    # Executa apenas se for push/merge na main (não executa em PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    # Define as permissões necessárias para o GITHUB_TOKEN poder empurrar o pacote
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to the GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/odevmatheus/nexum-app:latest